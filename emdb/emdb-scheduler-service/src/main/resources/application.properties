
# --------------------------------------------------------------------
# --- ALL PROFILES
# --------------------------------------------------------------------
quarkus.http.root-path=api
quarkus.http.port=60316
quarkus.otel.exporter.otlp.traces.endpoint=http://jaeger:4317

# --------------------------------------------------------------------
# --- DEFAULT LOGGING CONFIGURATION
# --------------------------------------------------------------------
quarkus.log.console.level=INFO
quarkus.log.json.log-format=ecs
quarkus.log.json.additional-field."service.name".value=emdb-scheduler-service
quarkus.log.json.additional-field."service.name".type=string

# --------------------------------------------------------------------
# --- DEFAULT MESSAGING CONFIGURATION
# --------------------------------------------------------------------
%prod.rabbitmq-host=rabbitmq
mp.messaging.incoming.movie-cron-in.connector=smallrye-rabbitmq
mp.messaging.incoming.movie-cron-in.exchange.name=emdb-exchange
mp.messaging.incoming.movie-cron-in.exchange.type=topic
mp.messaging.incoming.movie-cron-in.routing-keys=movie.cron
mp.messaging.incoming.movie-cron-in.queue.name=movie-cron

mp.messaging.outgoing.movie-ingest-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.movie-ingest-out.exchange.name=emdb-exchange
mp.messaging.outgoing.movie-ingest-out.exchange.type=topic
mp.messaging.outgoing.movie-ingest-out.routing-key=movie.ingest

mp.messaging.outgoing.job-log-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.job-log-out.exchange.name=emdb-exchange
mp.messaging.outgoing.job-log-out.exchange.type=topic
mp.messaging.outgoing.job-log-out.routing-key=job.log
