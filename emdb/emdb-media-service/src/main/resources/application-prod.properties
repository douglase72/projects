# --------------------------------------------------------------------
# --- PRODUCTION CONFIGURATION
# --------------------------------------------------------------------

# --------------------------------------------------------------------
# --- PRODUCTION SECURITY CONFIGURATION
# --------------------------------------------------------------------
quarkus.oidc.auth-server-url=${KEYCLOAK_AUTH_URL}
quarkus.oidc.token.issuer=${KEYCLOAK_ISSUER}

# --------------------------------------------------------------------
# --- PRODUCTION LOGGING CONFIGURATION
# --------------------------------------------------------------------
quarkus.log.json.log-format=ecs
quarkus.log.json.additional-field."service.name".value=emdb-media-service
quarkus.log.json.additional-field."service.name".type=string

# --------------------------------------------------------------------
# --- PRODUCTION MESSAGING CONFIGURATION
# --------------------------------------------------------------------
rabbitmq-host=rabbitmq

# --------------------------------------------------------------------
# --- PRODUCTION DATABASE CONFIGURATION
# --------------------------------------------------------------------
quarkus.datasource.jdbc.url=jdbc:postgresql://host.docker.internal:5432/prod
# TODO: Set these to false once the production database has been finalized.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=true
