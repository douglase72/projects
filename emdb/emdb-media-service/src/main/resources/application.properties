
# --------------------------------------------------------------------
# --- ALL PROFILES
# --------------------------------------------------------------------
quarkus.http.root-path=api
quarkus.http.port=60318
quarkus.index-dependency.validation.group-id=com.erdouglass
quarkus.index-dependency.validation.artifact-id=validation
quarkus.index-dependency.web-services.group-id=com.erdouglass
quarkus.index-dependency.web-services.artifact-id=web-services
quarkus.otel.exporter.otlp.traces.endpoint=http://jaeger:4317

# --------------------------------------------------------------------
# --- DEFAULT LOGGING CONFIGURATION
# --------------------------------------------------------------------
quarkus.log.console.level=INFO
quarkus.log.json.log-format=ecs
quarkus.log.json.additional-field."service.name".value=emdb-media-service
quarkus.log.json.additional-field."service.name".type=string

# --------------------------------------------------------------------
# --- DEFAULT MESSAGING CONFIGURATION
# --------------------------------------------------------------------
%prod.rabbitmq-host=rabbitmq
mp.messaging.incoming.movie-create-in.connector=smallrye-rabbitmq
mp.messaging.incoming.movie-create-in.exchange.name=emdb-exchange
mp.messaging.incoming.movie-create-in.exchange.type=topic
mp.messaging.incoming.movie-create-in.routing-keys=movie.create
mp.messaging.incoming.movie-create-in.queue.name=movie-create

mp.messaging.outgoing.audit-log-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.audit-log-out.exchange.name=emdb-exchange
mp.messaging.outgoing.audit-log-out.exchange.type=topic
mp.messaging.outgoing.audit-log-out.routing-key=audit.log
