# --------------------------------------------------------------------
# --- ALL PROFILES
# --------------------------------------------------------------------
quarkus.http.root-path=api
quarkus.http.port=60312
quarkus.index-dependency.validation.group-id=com.erdouglass
quarkus.index-dependency.validation.artifact-id=validation
quarkus.index-dependency.web-services.group-id=com.erdouglass
quarkus.index-dependency.web-services.artifact-id=web-services

# --------------------------------------------------------------------
# --- ALL PROFILES LOGGING
# --------------------------------------------------------------------
quarkus.log.console.level=INFO
quarkus.log.json.log-format=ecs
quarkus.log.json.additional-field."service.name".value=emdb-media-service
quarkus.log.json.additional-field."service.name".type=string

# --------------------------------------------------------------------
# --- ALL PROFILES DATABASE
# --------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://host.docker.internal:5432/prod
quarkus.datasource.username=${db.username}
quarkus.datasource.password=${db.password}
quarkus.hibernate-orm.database.default-schema=emdb_media
quarkus.hibernate-orm.jdbc.statement-batch-size=50
quarkus.flyway.schemas=emdb_media
quarkus.flyway.migrate-at-start=true
# TODO: Set this back to false once the production database has been finalized.
quarkus.flyway.clean-at-start=true

# --------------------------------------------------------------------
# --- ALL PROFILES MESSAGING
# --------------------------------------------------------------------
%prod.kafka.bootstrap.servers=kafka:9092
mp.messaging.incoming.movies.topic=movies
mp.messaging.incoming.movies.key.deserializer=org.apache.kafka.common.serialization.IntegerDeserializer
mp.messaging.incoming.series.topic=series
mp.messaging.incoming.series.key.deserializer=org.apache.kafka.common.serialization.IntegerDeserializer
