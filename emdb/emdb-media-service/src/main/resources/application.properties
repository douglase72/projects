
# --------------------------------------------------------------------
# --- ALL PROFILES
# --------------------------------------------------------------------
quarkus.http.root-path=api
quarkus.http.port=60318
quarkus.index-dependency.validation.group-id=com.erdouglass
quarkus.index-dependency.validation.artifact-id=validation
quarkus.index-dependency.web-services.group-id=com.erdouglass
quarkus.index-dependency.web-services.artifact-id=web-services
quarkus.otel.exporter.otlp.traces.endpoint=http://jaeger:4317

emdb.cli.movies=/home/erdouglass/projects/emdb/emdb-cli/movies

# --------------------------------------------------------------------
# --- DEFAULT LOGGING CONFIGURATION
# --------------------------------------------------------------------
quarkus.log.console.level=INFO
quarkus.log.json.log-format=ecs
quarkus.log.json.additional-field."service.name".value=emdb-media-service
quarkus.log.json.additional-field."service.name".type=string

# --------------------------------------------------------------------
# --- DEFAULT MESSAGING CONFIGURATION
# --------------------------------------------------------------------
%prod.rabbitmq-host=rabbitmq
mp.messaging.incoming.movie-create-in.connector=smallrye-rabbitmq
mp.messaging.incoming.movie-create-in.exchange.name=emdb-exchange
mp.messaging.incoming.movie-create-in.exchange.type=topic
mp.messaging.incoming.movie-create-in.routing-keys=movie.create
mp.messaging.incoming.movie-create-in.queue.name=movie-create
mp.messaging.incoming.movie-create-in.auto-bind-dlq=true
mp.messaging.incoming.movie-create-in.dead-letter-exchange=emdb-dlx
mp.messaging.incoming.movie-create-in.dead-letter-exchange-type=topic
mp.messaging.incoming.movie-create-in.dead-letter-routing-key=movie.#

mp.messaging.incoming.dead-letters-in.connector=smallrye-rabbitmq
mp.messaging.incoming.dead-letters-in.exchange.name=emdb-dlx
mp.messaging.incoming.dead-letters-in.exchange.type=topic
mp.messaging.incoming.dead-letters-in.queue.name=movie-dlq

mp.messaging.outgoing.job-log-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.job-log-out.exchange.name=emdb-exchange
mp.messaging.outgoing.job-log-out.exchange.type=topic
mp.messaging.outgoing.job-log-out.routing-key=job.log

# --------------------------------------------------------------------
# --- ALL PROFILES DATABASE
# --------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://host.docker.internal:5432/prod
quarkus.datasource.username=${db.username}
quarkus.datasource.password=${db.password}
quarkus.hibernate-orm.database.default-schema=emdb_media
quarkus.hibernate-orm.jdbc.statement-batch-size=50
quarkus.flyway.schemas=emdb_media
quarkus.flyway.migrate-at-start=true
# TODO: Set this back to false once the production database has been finalized.
quarkus.flyway.clean-at-start=true
