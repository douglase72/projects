# --------------------------------------------------------------------
# --- DEFAULT CONFIGURATION
# --------------------------------------------------------------------
quarkus.http.root-path=api
quarkus.http.port=60316

# --------------------------------------------------------------------
# --- DEFAULT LOGGING CONFIGURATION
# --------------------------------------------------------------------
quarkus.log.console.level=INFO

# --------------------------------------------------------------------
# --- DEFAULT MESSAGING CONFIGURATION
# --------------------------------------------------------------------
mp.messaging.incoming.ingest-media-in.connector=smallrye-rabbitmq
mp.messaging.incoming.ingest-media-in.exchange.name=emdb-commands
mp.messaging.incoming.ingest-media-in.routing-keys=ingest.media
mp.messaging.incoming.ingest-media-in.queue.name=ingest-media
mp.messaging.incoming.ingest-media-in.prefetch=1
mp.messaging.incoming.ingest-media-in.queue.arguments.x-single-active-consumer=true
mp.messaging.incoming.ingest-media-in.queue.arguments.x-single-active-consumer.type=boolean

mp.messaging.outgoing.movie-dlq-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.movie-dlq-out.exchange.name=emdb-dlx
mp.messaging.outgoing.movie-dlq-out.routing-key=movie.invalid

mp.messaging.incoming.movie-dlq-in.connector=smallrye-rabbitmq
mp.messaging.incoming.movie-dlq-in.exchange.name=emdb-dlx
mp.messaging.incoming.movie-dlq-in.routing-keys=movie.invalid
mp.messaging.incoming.movie-dlq-in.queue.name=movie-dlq

mp.messaging.outgoing.person-dlq-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.person-dlq-out.exchange.name=emdb-dlx
mp.messaging.outgoing.person-dlq-out.routing-key=person.invalid

mp.messaging.incoming.person-dlq-in.connector=smallrye-rabbitmq
mp.messaging.incoming.person-dlq-in.exchange.name=emdb-dlx
mp.messaging.incoming.person-dlq-in.routing-keys=person.invalid
mp.messaging.incoming.person-dlq-in.queue.name=person-dlq

# --------------------------------------------------------------------
# --- DEFAULT DATABASE CONFIGURATION
# --------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${db.username}
quarkus.datasource.password=${db.password}
quarkus.hibernate-orm.database.default-schema=emdb_media
quarkus.hibernate-orm.jdbc.statement-batch-size=50
quarkus.flyway.schemas=emdb_media
