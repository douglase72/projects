services:
  
  rabbitmq:
    image: rabbitmq:4.2.1-management
    container_name: rabbitmq 
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq   
    networks:
      - projects
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5  
      
  emdb-gateway:
    image: emdb-gateway:latest
    container_name: emdb-gateway
    build:
      context: ./emdb-gateway-service
      dockerfile: src/main/docker/Dockerfile
    ports:
      - 60330:60310
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./emdb-gateway-service/.env
    networks:
      - projects
    depends_on:
      rabbitmq:
        condition: service_healthy
                
  emdb-media:
    image: emdb-media:latest
    container_name: emdb-media
    build:
      context: ./emdb-media-service
      dockerfile: src/main/docker/Dockerfile
    ports:
      - 60336:60316
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./emdb-media-service/.env
    volumes:
      - /home/erdouglass/projects/emdb/media-data/images:/images
      - /home/erdouglass/projects/emdb/media-data/movies:/movies
      - /home/erdouglass/projects/emdb/media-data/people:/people
      - /home/erdouglass/projects/emdb/media-data/series:/series
    networks:
      - projects
    depends_on:
      rabbitmq:
        condition: service_healthy      

  emdb-ui:
    image: emdb-ui:latest
    container_name: emdb-ui
    build:
      context: .
      dockerfile: packages/emdb-ui/Dockerfile
    networks:
      - projects
    depends_on:
      - emdb-gateway

volumes:
  rabbitmq_data:
      
networks:
  projects:
    name: projects
    external: true
