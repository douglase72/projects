services:
  
  rabbitmq:
    image: rabbitmq:4.2.1-management
    container_name: rabbitmq 
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq   
    networks:
      - projects
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  emdb-gateway:
    image: emdb-gateway:latest
    container_name: emdb-gateway
    build:
      context: ./emdb-gateway-service
      dockerfile: src/main/docker/Dockerfile
    ports:
      - 60330:60310
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      - co.elastic.logs/enabled=true
      - co.elastic.logs/json.keys_under_root=true
      - co.elastic.logs/json.add_error_key=true
    networks:
      - projects
    depends_on:
      rabbitmq:
        condition: service_healthy
      
  emdb-scraper:
    image: emdb-scraper:latest
    container_name: emdb-scraper
    build:
      context: ./emdb-scraper-service
      dockerfile: src/main/docker/Dockerfile
    ports:
      - 60336:60316
    env_file:
      - ./emdb-scraper-service/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      - co.elastic.logs/enabled=true
      - co.elastic.logs/json.keys_under_root=true
      - co.elastic.logs/json.add_error_key=true
    networks:
      - projects
    depends_on:
      rabbitmq:
        condition: service_healthy
        
  emdb-media:
    image: emdb-media:latest
    container_name: emdb-media
    build:
      context: ./emdb-media-service
      dockerfile: src/main/docker/Dockerfile
    ports:
      - 60332:60312
    env_file:
      - ./emdb-media-service/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - EMDB_CLI_MOVIES=/movies
    volumes:
      - /home/erdouglass/projects/emdb/emdb-cli/movies:/movies
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      - co.elastic.logs/enabled=true
      - co.elastic.logs/json.keys_under_root=true
      - co.elastic.logs/json.add_error_key=true
    networks:
      - projects
    depends_on:
      rabbitmq:
        condition: service_healthy
        
  emdb-audit:
    image: emdb-audit:latest
    container_name: emdb-audit
    build:
      context: ./emdb-audit-service
      dockerfile: src/main/docker/Dockerfile
    ports:
      - 60338:60318
    env_file:
      - ./emdb-audit-service/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      - co.elastic.logs/enabled=true
      - co.elastic.logs/json.keys_under_root=true
      - co.elastic.logs/json.add_error_key=true
    networks:
      - projects
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:

networks:
  projects:
    name: projects
    external: true
