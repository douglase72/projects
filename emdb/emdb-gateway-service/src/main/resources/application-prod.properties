# --------------------------------------------------------------------
# --- PRODUCTION CONFIGURATION
# --------------------------------------------------------------------

# --------------------------------------------------------------------
# --- DEVELOPMENT SECURITY CONFIGURATION
# --------------------------------------------------------------------
quarkus.oidc.auth-server-url=${KEYCLOAK_AUTH_URL}
quarkus.oidc.token.issuer=${KEYCLOAK_ISSUER}

# --------------------------------------------------------------------
# --- PRODUCTION LOGGING CONFIGURATION
# --------------------------------------------------------------------
quarkus.log.console.level=INFO
quarkus.log.json.log-format=ecs
quarkus.log.json.additional-field."service.name".value=emdb-gateway-service
quarkus.log.json.additional-field."service.name".type=string

# --------------------------------------------------------------------
# --- PRODUCTION MESSAGING CONFIGURATION
# --------------------------------------------------------------------
rabbitmq-host=rabbitmq

# --------------------------------------------------------------------
# --- PRODUCTION REST ENDPOINT CONFIGURATION
# --------------------------------------------------------------------
quarkus.rest-client."com.erdouglass.emdb.gateway.client.JobClient".url=http://emdb-job:60318/api/jobs/ingest
quarkus.rest-client."com.erdouglass.emdb.gateway.client.MovieClient".url=http://emdb-media:60316/api/movies
quarkus.rest-client."com.erdouglass.emdb.gateway.client.PersonClient".url=http://emdb-media:60316/api/people
quarkus.rest-client."com.erdouglass.emdb.gateway.client.RoleClient".url=http://emdb-media:60316/api/roles
quarkus.rest-client."com.erdouglass.emdb.gateway.client.SeriesClient".url=http://emdb-media:60316/api/series
