# --------------------------------------------------------------------
# --- ALL PROFILES
# --------------------------------------------------------------------
quarkus.http.root-path=api
quarkus.http.port=60316
quarkus.index-dependency.web-services.group-id=com.erdouglass
quarkus.index-dependency.web-services.artifact-id=web-services

# --------------------------------------------------------------------
# --- DEFAULT LOGGING CONFIGURATION
# --------------------------------------------------------------------
quarkus.log.console.level=INFO
quarkus.log.json.log-format=ecs
quarkus.log.json.additional-field."service.name".value=emdb-scraper-service
quarkus.log.json.additional-field."service.name".type=string
logging.client.excludes=https://api.themoviedb.org/3/person

# --------------------------------------------------------------------
# --- DEFAULT MESSAGING CONFIGURATION
# --------------------------------------------------------------------
kafka.bootstrap.servers=kafka:9092
mp.messaging.outgoing.movies.topic=movies
mp.messaging.outgoing.movies.key.serializer=org.apache.kafka.common.serialization.IntegerSerializer
mp.messaging.outgoing.series.topic=series
mp.messaging.outgoing.series.key.serializer=org.apache.kafka.common.serialization.IntegerSerializer
mp.messaging.outgoing.series.compression.type=zstd
mp.messaging.outgoing.series.max.request.size=5242880

# --------------------------------------------------------------------
# --- DEFAULT TMDB CONFIGURATION
# --------------------------------------------------------------------
tmdb.cast.limit=3
tmdb.crew.limit=2
tmdb.rate.limit=50
tmdb.url=https://api.themoviedb.org/3
quarkus.rest-client."com.erdouglass.emdb.scraper.client.TmdbMovieClient".url=${tmdb.url}
quarkus.rest-client."com.erdouglass.emdb.scraper.client.TmdbPersonClient".url=${tmdb.url}
quarkus.rest-client."com.erdouglass.emdb.scraper.client.TmdbSeriesClient".url=${tmdb.url}
