# --------------------------------------------------------------------
# --- ALL PROFILES
# --------------------------------------------------------------------
quarkus.http.root-path=api
quarkus.http.port=60316
quarkus.index-dependency.web-services.group-id=com.erdouglass
quarkus.index-dependency.web-services.artifact-id=web-services

# --------------------------------------------------------------------
# --- DEFAULT LOGGING CONFIGURATION
# --------------------------------------------------------------------
quarkus.log.console.level=INFO
quarkus.log.json.log-format=ecs
quarkus.log.json.additional-field."service.name".value=emdb-scraper-service
quarkus.log.json.additional-field."service.name".type=string
logging.client.excludes=https://api.themoviedb.org/3/person

# --------------------------------------------------------------------
# --- DEFAULT MESSAGING CONFIGURATION
# --------------------------------------------------------------------
mp.messaging.outgoing.movie-request-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.movie-request-out.exchange.name=movie-request-exchange
mp.messaging.incoming.movie-request-in.connector=smallrye-rabbitmq
mp.messaging.incoming.movie-request-in.queue.name=movie-request-in
mp.messaging.incoming.movie-request-in.exchange.name=movie-request-exchange
mp.messaging.incoming.movie-request-in.prefetch=1

mp.messaging.outgoing.movie-status-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.movie-status-out.exchange.name=movie-status-exchange
mp.messaging.incoming.movie-status-in.connector=smallrye-rabbitmq
mp.messaging.incoming.movie-status-in.queue.name=movie-status-in
mp.messaging.incoming.movie-status-in.exchange.name=movie-status-exchange

mp.messaging.outgoing.movie-create-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.movie-create-out.exchange.name=movie-create-exchange

# --------------------------------------------------------------------
# --- DEFAULT TMDB CONFIGURATION
# --------------------------------------------------------------------
tmdb.cast.limit=3
tmdb.crew.limit=2
tmdb.rate.limit=50
tmdb.url=https://api.themoviedb.org/3
quarkus.rest-client."com.erdouglass.emdb.scraper.client.TmdbMovieClient".url=${tmdb.url}
quarkus.rest-client."com.erdouglass.emdb.scraper.client.TmdbPersonClient".url=${tmdb.url}
quarkus.rest-client."com.erdouglass.emdb.scraper.client.TmdbSeriesClient".url=${tmdb.url}
