syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.erdouglass.emdb.media.proto.v1";
option java_outer_classname = "CommonProto";

package emdb.media.v1;

message Image {
  string name = 1;
  string tmdb_name = 2;
}

enum CreditType {
  CREDIT_TYPE_UNSPECIFIED = 0;
  CAST = 1;
  CREW = 2;
}

enum MediaType {
  MEDIA_TYPE_UNSPECIFIED = 0;
  MOVIE = 1;
  PERSON = 2;
  SERIES = 3;
}

enum SaveStatus {
  SAVE_STATUS_UNSPECIFIED = 0;
  CREATED = 1;
  UPDATED = 2;
  UNCHANGED = 3;
}

enum ShowStatus {
  SHOW_STATUS_UNSPECIFIED = 0;
  CANCELED = 1;
  ENDED = 2;
  IN_PRODUCTION = 3;
  PILOT = 4;
  PLANNED = 5;
  POST_PRODUCTION = 6;
  RELEASED = 7;
  RETURNING_SERIES = 8;
  RUMORED = 9;
}

message SaveResult {
  SaveStatus status = 1;
  int64 id = 2;
  int32 tmdb_id = 3;
}

message Role {
  string id = 1;
  optional string character = 2;
  int32 episode_count = 3;
}

message Job {
  string id = 1;
  optional string title = 2;
  int32 episode_count = 3;
}
