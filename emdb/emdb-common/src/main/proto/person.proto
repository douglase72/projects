syntax = "proto3";

import "google/protobuf/empty.proto";
import "common.proto";

option java_multiple_files = true;
option java_package = "com.erdouglass.emdb.media.proto.v1";
option java_outer_classname = "PersonProto";

package emdb.media.v1;

service PersonService {
  rpc Save (SavePersonRequest) returns (SavePersonResponse) {}
  rpc SaveAll (SavePeopleRequest) returns (PeopleResponse) {} 
  rpc FindById (FindPersonRequest) returns (PersonResponse) {}
  rpc Update (UpdatePersonRequest) returns (PersonResponse) {}
  rpc Delete (DeletePersonRequest) returns (google.protobuf.Empty) {}
}

enum Gender {
  GENDER_UNSPECIFIED = 0;
  UNKNOWN = 1;
  FEMALE = 2;
  MALE = 3;
  NON_BINARY = 4;
}

message SavePersonRequest {
  int32 tmdb_id = 1;
  string name = 2;
  optional string birth_date = 3;
  optional string death_date = 4;
  optional Gender gender = 5;
  optional Image profile = 6;
  optional string Birth_place = 7;
  optional string biography = 8;
}

message SavePeopleRequest {
  repeated SavePersonRequest people = 1;
}

message FindPersonRequest {
  int64 id = 1;
  optional string append = 2;
}

message UpdatePersonRequest {
  int64 id = 1;
  UpdatePersonCommand command = 2;
}

message UpdatePersonCommand {
  string name = 1;
  optional string birth_date = 2;
  optional string death_date = 3;
  optional Gender gender = 4;
  optional string profile = 5;
  optional string Birth_place = 6;
  optional string biography = 7;
}

message DeletePersonRequest {
  int64 id = 1;
}

message CreditResponse {
  string id = 1;
  int32 order = 2;
  CreditType type = 3;
  oneof credit_details {
    MovieCreditDetails movie_credit = 4;
    SeriesCreditDetails series_credit = 5;
  }
}

message MovieCreditDetails {
  string credit_id = 1;
  int64 id = 2;
  string title = 3;
  optional string release_date = 4;
  optional float score = 5;
  optional string backdrop = 6;
  optional string poster = 7;
  optional string overview = 8;
  oneof role_details {
    string character = 9;
    string job = 10;
  }
}

message SeriesCreditDetails {
  string credit_id = 1;
  int64 id = 2;
  string title = 3;
  optional string first_air_date = 4;
  optional float score = 5;
  optional string backdrop = 6;
  optional string poster = 7;
  optional string overview = 8;
  oneof role_details {
    CastRoles cast_roles = 9;
    CrewJobs crew_jobs = 10;
  }
}

message CastRoles {
  repeated Role roles = 1;
}

message CrewJobs {
  repeated Job jobs = 1;
}

message PersonResponse {
  int64 id = 1;
  int32 tmdb_id = 2;
  string name = 3;
  optional string birth_date = 4;
  optional string death_date = 5;
  optional Gender gender = 6;
  optional string profile = 7;
  optional string Birth_place = 8;
  optional string biography = 9;
  repeated CreditResponse credits = 10;
}

message SavePersonResponse {
  SaveStatus status = 1;
  PersonResponse person = 2;
}

message PeopleResponse {
  repeated SaveResult results = 1;
}

