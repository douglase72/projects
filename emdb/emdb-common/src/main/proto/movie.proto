syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.erdouglass.emdb.media.proto.v1";
option java_outer_classname = "MovieProto";

package emdb.media.v1;

service MovieService {
  rpc Save (SaveMovieRequest) returns (MovieResponse) {}
}

message SaveMovieRequest {
  int32 tmdb_id = 1;
  string title = 2;
  string release_date = 3;
}

message MovieResponse {
  int64 id = 1;
  int32 tmdb_id = 2;
  string title = 3;
  string release_date = 4;
}

