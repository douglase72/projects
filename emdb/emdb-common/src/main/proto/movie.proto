syntax = "proto3";

import "google/protobuf/empty.proto";
import "common.proto";
import "person.proto";

option java_multiple_files = true;
option java_package = "com.erdouglass.emdb.media.proto.v1";
option java_outer_classname = "MovieProto";

package emdb.media.v1;

service MovieService {
  rpc Save (SaveMovieRequest) returns (SaveMovieResponse) {}
  rpc FindById (FindMovieRequest) returns (MovieResponse) {}
  rpc Update (UpdateMovieRequest) returns (MovieResponse) {}
  rpc Delete (DeleteMovieRequest) returns (google.protobuf.Empty) {}
}

message MovieCastCreditRequest {
  int32 tmdb_id = 1;
  optional string character = 2;
  int32 order = 3;
}

message MovieCrewCreditRequest {
  int32 tmdb_id = 1;
  optional string job = 2;
}

message MovieCreditRequest {
  repeated MovieCastCreditRequest cast = 1;
  repeated MovieCrewCreditRequest crew = 2;
}

message SaveMovieRequest {
  int32 tmdb_id = 1;
  string title = 2;
  optional string release_date = 3;
  optional float score = 4;
  optional ShowStatus status = 5;
  optional int32 runtime = 6;
  optional int32 budget = 7;
  optional int32 revenue = 8;
  optional string backdrop = 9;
  optional string poster = 10;
  optional string homepage = 11;
  optional string original_language = 12;
  optional string tagline = 13;
  optional string overview = 14;
  MovieCreditRequest credits = 15;
  repeated SavePersonRequest people = 16;
}

message FindMovieRequest {
  int64 id = 1;
  optional string append = 2;
}

message UpdateMovieRequest {
  int64 id = 1;
  UpdateMovieCommand command = 2;
}

message UpdateMovieCommand {
  string title = 1;
  optional string release_date = 2;
  optional float score = 3;
  optional ShowStatus status = 4;
  optional int32 runtime = 5;
  optional int32 budget = 6;
  optional int32 revenue = 7;
  optional string backdrop = 8;
  optional string poster = 9;
  optional string homepage = 10;
  optional string original_language = 11;
  optional string tagline = 12;
  optional string overview = 13;
}

message DeleteMovieRequest {
  int64 id = 1;
}

message MovieCastCreditResponse {
  string credit_id = 1;
  int64 id = 2;
  string name = 3;
  Gender gender = 4;
  optional string profile = 5;
  optional string character = 6;
  int32 order = 7;
}

message MovieCrewCreditResponse {
  string credit_id = 1;
  int64 id = 2;
  string name = 3;
  Gender gender = 4;
  optional string profile = 5;
  optional string job = 6;
}

message MovieCreditResponse {
  repeated MovieCastCreditResponse cast = 1;
  repeated MovieCrewCreditResponse crew = 2;
}

message MovieResponse {
  int64 id = 1;
  int32 tmdb_id = 2;
  string title = 3;
  optional string release_date = 4;
  optional float score = 5;
  optional ShowStatus status = 6; 
  optional int32 runtime = 7;
  optional int32 budget = 8;
  optional int32 revenue = 9;
  optional string backdrop = 10;
  optional string poster = 11;
  optional string homepage = 12;
  optional string original_language = 13;
  optional string tagline = 14;
  optional string overview = 15;
  optional MovieCreditResponse credits = 16;
}

message SaveMovieResponse {
  SaveStatus status = 1;
  MovieResponse movie = 2;
}

