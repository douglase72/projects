plugins {
  id 'java-library'
  alias(libs.plugins.quarkus)
}

group = 'com.erdouglass.emdb'
version = '1.0.0-SNAPSHOT'

dependencies {
  implementation enforcedPlatform(libs.quarkus.bom)
  
  api project(':validation')
  
  compileOnly libs.jackson.annotations
  compileOnly libs.jakarta.validation
  
  implementation libs.quarkus.grpc
}

tasks.register('cleanGrpcSources', Delete) {
  delete 'build/classes/java/quarkus-generated-sources/grpc'
}

tasks.named('compileJava') {
  dependsOn 'cleanGrpcSources'
}

sourceSets {
  main {
    java {
      srcDirs += 'build/classes/java/quarkus-generated-sources/grpc'
    }
  }
}
