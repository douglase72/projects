load_module modules/ngx_http_image_filter_module.so;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    limit_req_zone $binary_remote_addr zone=api_read:10m rate=1000r/s;
    
    proxy_cache_path /var/cache/nginx/images levels=1:2 keys_zone=images:10m max_size=1g inactive=30d use_temp_path=off;

    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name localhost;

        # EMDB Vue.js Application
        # Matches http://localhost/emdb/
        location /emdb/ {
            set $upstream_ui http://emdb-ui:80;
            rewrite ^/emdb/(.*) /$1 break;
            proxy_pass $upstream_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # EMDB API Gateway
        # Matches http://localhost/emdb/api/
        location /emdb/api/ {
            client_max_body_size 10M;
            limit_req_status 429;
            limit_req zone=api_read burst=20 nodelay;
            set $upstream_api http://emdb-gateway:60310;
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            proxy_read_timeout 24h; 
        }
        
        # EMDB "Original" (No resizing)
        # URL: http://localhost/emdb/images/original/5787ee... .jpg
        location ~ "^/emdb/images/original/([a-f0-9\-]+)([a-f0-9]{2})\.jpg$" {
            set $filename "$1$2";
            set $bucket $2;
            
            root /usr/share/nginx/html;
            try_files /images/original/$bucket/$filename.jpg 
                      /images-dev/original/$bucket/$filename.jpg 
                      =404;
            add_header Cache-Control "public, max-age=31536000";
        }

        # EMDB "Resized"
        # URL: http://localhost/emdb/images/w92/5787ee... .jpg
        location ~ "^/emdb/images/w([0-9]+)/([a-f0-9\-]+)([a-f0-9]{2})\.jpg$" {
            set $width $1;
            set $filename "$2$3";
            set $bucket $3; 
            
            # Tell imgproxy to fetch the original image from Nginx
            set $source_url "http://nginx/emdb/images/original/$filename.jpg";      
            proxy_pass http://imgproxy:8080/insecure/rs:fill:$width:0/plain/$source_url;
            
            proxy_cache images;
            proxy_cache_key "$uri";
            proxy_cache_valid 200 30d;
            add_header X-Cache-Status $upstream_cache_status;            
        }
    }
}